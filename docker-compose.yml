services:
  whois-service:
    build: .
    container_name: whois-service
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - CACHE_TTL=3600
      - RATE_LIMIT_WINDOW=60000
      - RATE_LIMIT_MAX=60
      - NODE_ENV=production
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
